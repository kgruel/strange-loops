[project]
name = "prism"
version = "0.1.0"
description = "Scoped, event-driven, schema-shaped, terminal-rendered applications"
requires-python = ">=3.11"

[tool.uv.workspace]
members = ["libs/peers", "libs/facts", "libs/ticks", "libs/shapes", "libs/cells", "experiments"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
